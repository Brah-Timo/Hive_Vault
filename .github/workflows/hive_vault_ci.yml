name: HiveVault CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze --no-fatal-infos

  integrity:
    name: Integrity Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - run: flutter test test/compression/gzip_provider_test.dart --reporter expanded
      - run: flutter test test/compression/lz4_provider_test.dart --reporter expanded
      - run: flutter test test/binary/binary_processor_test.dart --reporter expanded
      - run: flutter test test/binary/lru_cache_test.dart --reporter expanded

  security:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - run: flutter test test/encryption/aes_gcm_test.dart --reporter expanded
      - run: flutter test test/encryption/key_manager_test.dart --reporter expanded

  indexing:
    name: Indexing Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter test test/indexing/index_engine_test.dart --reporter expanded

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [integrity, security, indexing]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter test test/integration/vault_integration_test.dart --reporter expanded

  full_suite:
    name: Full Test Suite + Coverage
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter test --coverage --reporter json > test_results.json || true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  matrix:
    name: Flutter ${{ matrix.flutter_version }}
    runs-on: ubuntu-latest
    needs: quality

    strategy:
      fail-fast: false
      matrix:
        flutter_version: ["3.22.x", "3.24.x"]

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter_version }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - run: flutter test test/compression/ --reporter expanded
      - run: flutter test test/binary/ --reporter expanded
      - run: flutter test test/indexing/ --reporter expanded

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [full_suite, matrix]
    if: always()

    steps:
      - name: Print CI result
        run: |
          echo "══════════════════════════════════════"
          echo "  HiveVault CI completed"
          echo "  Status: ${{ needs.full_suite.result }}"
          echo "══════════════════════════════════════"
